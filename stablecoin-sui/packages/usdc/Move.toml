[package]
name = "usdc"
edition = "2024"
license = "Apache 2.0"

# New (sui >= 1.63) package management format — no [addresses] section; the
# package's named address comes from `name` above. Sui/MoveStdlib are implicit
# system deps. Build with `--build-env testnet`, publish via `test-publish`.
[dependencies]
stablecoin = { local = "../stablecoin" }
sui_extensions = { local = "../sui_extensions" }
